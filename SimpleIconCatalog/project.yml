name: SimpleIconCatalog
options:
  bundleIdPrefix: com.simpleiconcatalog
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
targets:
  SimpleIconCatalog:
    type: application
    platform: macOS
    sources:
      - path: SimpleIconCatalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simpleiconcatalog.app
        PRODUCT_NAME: Simple Icon Catalog
        PRODUCT_MODULE_NAME: IconViewer
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
  SimpleIconCatalogTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SimpleIconCatalogTests
    dependencies:
      - target: SimpleIconCatalog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simpleiconcatalog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Simple Icon Catalog.app/Contents/MacOS/Simple Icon Catalog"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  SimpleIconCatalog:
    build:
      targets:
        SimpleIconCatalog: all
        SimpleIconCatalogTests: [test]
    test:
      targets:
        - SimpleIconCatalogTests
