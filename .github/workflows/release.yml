name: Release

on:
  push:
    branches: [main]
    paths:
      - SimpleIconCatalog/project.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from project.yml
        id: version
        run: |
          VERSION=$(awk '/MARKETING_VERSION:/ { gsub(/"/, "", $2); print $2; exit }' SimpleIconCatalog/project.yml)
          if [ -z "$VERSION" ]; then
            echo "Failed to read MARKETING_VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tools
        if: steps.check.outputs.exists == 'false'
        run: brew install xcodegen imagemagick

      - name: Select Xcode
        if: steps.check.outputs.exists == 'false'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/build-release.sh --release
